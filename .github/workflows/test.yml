name: test
on:
  push:
    branches:
      - "**"
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v4
        with:
          go-version-file: go.mod

      - name: test
        run: |
          make check
          make bench
